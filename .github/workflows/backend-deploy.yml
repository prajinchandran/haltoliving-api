name: Build and deploy .NET API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 🔍 (Optional but helpful) See folder structure
      - name: List files
        run: ls -R

      # 3. Restore dependencies (UPDATE PATH IF NEEDED)
      - name: Restore
        run: dotnet restore ./halto.API/halto.API.csproj

      # 4. Build
      - name: Build
        run: dotnet build ./halto.API/halto.API.csproj --configuration Release --no-restore

      # 5. Publish
      - name: Publish
        run: dotnet publish ./halto.API/halto.API.csproj -c Release -o ./publish

      # 6. Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'halto-api-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          package: ./publish
