name: Build and deploy .NET API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. Verify structure (important for debugging)
      - name: List files
        run: ls -R

      # 4. Restore (use solution)
      - name: Restore
        run: dotnet restore Halto.sln

      # 5. Build
      - name: Build
        run: dotnet build Halto.sln --configuration Release --no-restore

      # 6. Publish ONLY API project
      - name: Publish
        run: dotnet publish ./halto.API/halto.API.csproj -c Release -o ./publish

      # 7. Deploy
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'halto-api-backend'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          package: ./publish
