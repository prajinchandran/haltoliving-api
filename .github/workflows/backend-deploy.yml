name: Build and deploy .NET API to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup .NET (your project is net9.0)
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # 3. Restore solution
      - name: Restore
        run: dotnet restore Halto.sln

      # 4. Clean (IMPORTANT for CI issues)
      - name: Clean
        run: dotnet clean Halto.sln

      # 5. Build solution
      - name: Build
        run: dotnet build Halto.sln --configuration Release

      # 6. Publish API project (IMPORTANT PATH)
      - name: Publish
        run: dotnet publish ./Halto.Api/halto.API.csproj -c Release -o ./publish

      # 7. Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'halto-api-backend'   # 🔥 CHANGE if your app name is different
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          package: ./publish
